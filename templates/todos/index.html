{% extends "base.html" %}
{% block title %}Mes tâches - Todo List{% endblock %}
{% block content %}
<h1>Mes tâches</h1>
<form method="POST" action="{{ url_for('todos.add') }}" class="add-form">
    <input type="text" name="title" placeholder="Nouvelle tâche..." required>
    <button type="submit">Ajouter</button>
</form>
{% if todos %}
{% for todo in todos %}
<div class="todo-item {% if todo.completed %}completed{% endif %}">
    <span class="todo-title">{{ todo.title }}</span>
    <div class="todo-actions">
        <form method="POST" action="{{ url_for('todos.toggle', todo_id=todo.id) }}" style="display: inline;">
            <button type="submit">{{ 'Annuler' if todo.completed else 'Terminer' }}</button>
        </form>
        <form method="POST" action="{{ url_for('todos.delete', todo_id=todo.id) }}" style="display: inline;" onsubmit="return confirm('Supprimer cette tâche ?');">
            <button type="submit" class="btn-danger">Supprimer</button>
        </form>
    </div>
</div>
{% endfor %}
{% else %}
<p style="color: #94a3b8;">Aucune tâche. Ajoutez-en une ci-dessus.</p>
{% endif %}
{% endblock %}
