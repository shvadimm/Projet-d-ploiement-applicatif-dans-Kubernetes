{% extends "base.html" %}
{% block title %}Todo List{% endblock %}
{% block content %}

<p style="margin-bottom: 1.5rem; color: #94a3b8;">Organisez vos tâches simplement. Inscrivez-vous ou connectez-vous pour commencer.</p>

{% endblock %}
