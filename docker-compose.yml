services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tododb
      MYSQL_USER: todouser
      MYSQL_PASSWORD: todopass
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ghcr.io/shvadimm/projet-d-ploiement-applicatif-dans-kubernetes:sha-40cbaa7
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: mysql+pymysql://todouser:todopass@db:3306/tododb
      SECRET_KEY: changez-moi-en-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
