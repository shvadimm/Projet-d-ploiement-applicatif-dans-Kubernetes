{% extends "base.html" %}
{% block title %}Connexion - Todo List{% endblock %}
{% block content %}
<h1>Connexion</h1>
<form method="POST">
    <div class="form-group">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required autofocus>
    </div>
    <div class="form-group">
        <input type="password" name="password" placeholder="Mot de passe" required>
    </div>
    <button type="submit">Se connecter</button>
</form>
<p style="margin-top: 1rem; color: #64748b;">Pas de compte ? <a href="{{ url_for('auth.register') }}" style="color: #3b82f6;">S'inscrire</a></p>
{% endblock %}
