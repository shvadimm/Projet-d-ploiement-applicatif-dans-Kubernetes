{% extends "base.html" %}
{% block title %}Inscription - Todo List{% endblock %}
{% block content %}
<h1>Inscription</h1>
<form method="POST">
    <div class="form-group">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required autofocus>
    </div>
    <div class="form-group">
        <input type="email" name="email" placeholder="Email" required>
    </div>
    <div class="form-group">
        <input type="password" name="password" placeholder="Mot de passe" required>
    </div>
    <div class="form-group">
        <input type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required>
    </div>
    <button type="submit">S'inscrire</button>
</form>
<p style="margin-top: 1rem; color: #64748b;">Déjà un compte ? <a href="{{ url_for('auth.login') }}" style="color: #3b82f6;">Se connecter</a></p>
{% endblock %}
