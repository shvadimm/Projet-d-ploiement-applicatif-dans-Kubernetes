apiVersion: v1
kind: Service
metadata:
  name: mariadb-galera-headless
  namespace: todos
  labels:
    app: mariadb-galera
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mariadb-galera
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
    - name: galera
      port: 4567
      targetPort: 4567
    - name: ist
      port: 4568
      targetPort: 4568
    - name: sst
      port: 4444
      targetPort: 4444
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-galera
  namespace: todos
  labels:
    app: mariadb-galera
spec:
  type: ClusterIP
  selector:
    app: mariadb-galera
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-galera
  namespace: todos
  labels:
    app: mariadb-galera
spec:
  serviceName: mariadb-galera-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: mariadb-galera
  template:
    metadata:
      labels:
        app: mariadb-galera
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: mariadb-galera
          image: bitnami/mariadb-galera:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
            - name: galera
              containerPort: 4567
            - name: ist
              containerPort: 4568
            - name: sst
              containerPort: 4444
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todos-secret
                  key: DB_ROOT_PASSWORD
            - name: MARIADB_DATABASE
              value: tododb
            - name: MARIADB_USER
              value: todouser
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todos-secret
                  key: DB_PASSWORD
            - name: MARIADB_GALERA_CLUSTER_NAME
              value: todos-galera
            - name: MARIADB_GALERA_CLUSTER_ADDRESS
              value: gcomm://mariadb-galera-0.mariadb-galera-headless.todos.svc.cluster.local,mariadb-galera-1.mariadb-galera-headless.todos.svc.cluster.local,mariadb-galera-2.mariadb-galera-headless.todos.svc.cluster.local
            - name: MARIADB_GALERA_MARIABACKUP_USER
              value: mariabackup
            - name: MARIADB_GALERA_MARIABACKUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todos-secret
                  key: GALERA_BACKUP_PASSWORD
            - name: MARIADB_REPLICATION_USER
              value: replicator
            - name: MARIADB_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todos-secret
                  key: GALERA_REPLICATION_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /bitnami/mariadb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
